<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Saga - Login</title>
    <!-- CSS Global primeiro, CSS específico depois -->
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/login.css">
</head>

<body class="pagina-login scanlines">
    <div class="fundo-login">
        <div class="fundo-login__imagem"></div>
        <div class="fundo-login__gradiente"></div>
    </div>

    <main class="container-login">
        <div class="marca-login">
            <h1 class="marca-login__titulo">TASK<br>SAGA</h1>
        </div>

        <div class="painel-login">
            <div class="painel-login__brilho"></div>

            <div class="cabecalho-login">
                <h2 class="cabecalho-login__titulo">Login</h2>
                <div class="cabecalho-login__divisor"></div>
            </div>

            <div id="mensagem-erro" class="mensagem-erro"></div>

            <form id="form-login" class="formulario-login">
                <div class="grupo-campo">
                    <label class="grupo-campo__rotulo" for="usuario">Herói</label>
                    <div class="grupo-campo__wrapper">
                        <input type="text" id="usuario" class="grupo-campo__input" placeholder="Digite seu nome (heroi)"
                            autocomplete="off">
                        <span class="material-symbols-outlined grupo-campo__icone">swords</span>
                    </div>
                </div>

                <div class="grupo-campo">
                    <label class="grupo-campo__rotulo" for="senha">Senha Secreta</label>
                    <div class="grupo-campo__wrapper">
                        <input type="password" id="senha" class="grupo-campo__input" placeholder="•••• (1234)">
                        <span class="material-symbols-outlined grupo-campo__icone clicavel"
                            id="alternar-senha">visibility_off</span>
                    </div>
                </div>

                <button type="submit" id="btn-submit" class="botao-login">
                    <span id="rotulo-botao">Entre na Dungeon</span>
                </button>
            </form>

            <div class="rodape-login">
                <p class="rodape-login__texto">
                    Ainda não é um aventureiro? <span class="rodape-login__link">Crie sua conta</span>
                </p>
            </div>
        </div>
    </main>

    <script src="../js/app.js"></script>
    <script src="../js/login.js"></script>
</body>

</html>
